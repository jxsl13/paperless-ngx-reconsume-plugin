# Example: add paperless-reconsume to the official paperless-ngx compose setup.
#
# Place this file next to your docker-compose.yml as
# docker-compose.override.yml (docker compose merges it automatically),
# or copy the marked lines into your existing service definition.
#
# Assumes this repository is cloned to ./paperless-reconsume

services:
  webserver:
    volumes:
      - ./paperless-reconsume/reconsume:/usr/src/paperless/plugins/reconsume:ro
    environment:
      PAPERLESS_APPS: "reconsume"
      PYTHONPATH: "/usr/src/paperless/plugins"
      # --- optional tuning (defaults shown) ---
      # RECONSUME_SET_CREATED: "true"
      # RECONSUME_DATE_STRATEGY: "heuristic"   # heuristic | first
      # RECONSUME_REPLACE: "false"
      # RECONSUME_ADD_INBOX_TAGS: "false"
      # RECONSUME_RUN_WORKFLOWS: "updated"     # added | updated | none
