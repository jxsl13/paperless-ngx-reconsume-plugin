# Example systemd drop-in for bare-metal / LXC installs.
#
# Install as (repeat for every paperless service):
#   /etc/systemd/system/paperless-webserver.service.d/reconsume.conf
#   /etc/systemd/system/paperless-consumer.service.d/reconsume.conf
#   /etc/systemd/system/paperless-scheduler.service.d/reconsume.conf
#   /etc/systemd/system/paperless-task-queue.service.d/reconsume.conf
#
# Then: systemctl daemon-reload && systemctl restart paperless-*
#
# Adjust the path if you cloned the plugin elsewhere.

[Service]
Environment=PYTHONPATH=/opt/paperless/plugins
